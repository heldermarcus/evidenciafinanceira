{% extends 'base.html' %}
{% block title %}Novo Cliente | HM de Finanças{% endblock %}

{% block content %}
<article class="card" style="max-width: 600px; margin: 0 auto;">
    <header>
        <h2>Novo Cliente</h2>
        <p>Cadastre um cliente para vender a prazo.</p>
    </header>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        
        <div class="grid">
            <a href="{% url 'customer_list' %}" role="button" class="outline secondary">Cancelar</a>
            <button type="submit">Salvar Cliente</button>
        </div>
    </form>
</article>
{% endblock %}
